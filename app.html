<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/tasks.css">
    <title>Gestor de Tareas</title>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1>Mis tareas</h1>
            <!-- From Uiverse.io by xopc333 -->
            <button class="logout" onclick="logout()">
                <div class="button-box">
                    <span class="button-elem">
                        <svg viewBox="0 0 46 40" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M46 20.038c0-.7-.3-1.5-.8-2.1l-16-17c-1.1-1-3.2-1.4-4.4-.3-1.2 1.1-1.2 3.3 0 4.4l11.3 11.9H3c-1.7 0-3 1.3-3 3s1.3 3 3 3h33.1l-11.3 11.9c-1 1-1.2 3.3 0 4.4 1.2 1.1 3.3.8 4.4-.3l16-17c.5-.5.8-1.1.8-1.9z">
                            </path>
                        </svg>
                    </span>
                    <span class="button-elem">
                        <svg viewBox="0 0 46 40">
                            <path
                                d="M46 20.038c0-.7-.3-1.5-.8-2.1l-16-17c-1.1-1-3.2-1.4-4.4-.3-1.2 1.1-1.2 3.3 0 4.4l11.3 11.9H3c-1.7 0-3 1.3-3 3s1.3 3 3 3h33.1l-11.3 11.9c-1 1-1.2 3.3 0 4.4 1.2 1.1 3.3.8 4.4-.3l16-17c.5-.5.8-1.1.8-1.9z">
                            </path>
                        </svg>
                    </span>
                </div>
            </button>
        </div>


        <div class="category-input">
            <input id="categoryInput" placeholder="Nueva categoría">

            <div class="color-picker">
                <div class="color-option selected" data-color="#000000"></div>
                <div class="color-option" data-color="#3b82f6"></div>
                <div class="color-option" data-color="#22c55e"></div>
                <div class="color-option" data-color="#a855f7"></div>
                <div class="color-option" data-color="#f97316"></div>
                <div class="color-option" data-color="#ef4444"></div>
            </div>

            <button onclick="addCategory()">Crear</button>
        </div>

        <div class="filters">
            <button onclick="setFilter('all')">Todas</button>
            <button onclick="setFilter('pending')">Pendientes</button>
            <button onclick="setFilter('done')">Completadas</button>
        </div>

        <div id="categories"></div>

    </div>
    <script src="/JS/tasks.js"></script>
</body>

</html>
